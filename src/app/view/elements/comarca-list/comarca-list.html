<section class="panel">
	<h2>RegionsList component</h2>

	<div class="chips">
		@for (comarca of comarques(); track comarca) {
			<button
				type="button"
				class="chip"
				[class.active]="selectedComarca() === comarca"
				(click)="onSelect(comarca)">
				{{ comarca }}
			</button>
		}
	</div>
</section>
