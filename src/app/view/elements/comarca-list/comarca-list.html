<section class="panel">
	<h2>RegionsList component</h2>

	<label class="select-label" for="comarca-select">Selecciona una comarca</label>
	<select
		id="comarca-select"
		class="comarca-select"
		(change)="onSelect($any($event.target).value)">
		<option value="">Totes les comarques</option>
		@for (comarca of comarques(); track comarca) {
			<option [value]="comarca" [selected]="selectedComarca() === comarca">{{ comarca }}</option>
		}
	</select>
</section>
